name: CI - Backend

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-package:
    name: Validar y empaquetar FastAPI
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      DATABASE_URL: sqlite:///./portoasiste_ci.db
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Instalar dependencias
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt

      - name: Verificar dependencias Python
        run: python -m pip check

      - name: Verificar formato y reglas estáticas
        run: ruff check .

      - name: Ejecutar pruebas
        run: pytest --junitxml=test-results/pytest.xml

      - name: Verificar arranque con Gunicorn y Uvicorn
        shell: bash
        run: |
          gunicorn --bind 127.0.0.1:8000 -k uvicorn.workers.UvicornWorker app.main:app \
            > gunicorn.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT

          for attempt in {1..20}; do
            echo "Esperando a FastAPI (intento $attempt/20)"
            if curl --fail --silent --show-error http://127.0.0.1:8000/health | grep -qx '{"status":"ok"}'; then
              exit 0
            fi
            sleep 1
          done

          cat gunicorn.log
          exit 1

      - name: Guardar registro del servidor si falla
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-runtime-log
          path: gunicorn.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Crear paquete para Elastic Beanstalk
        shell: bash
        run: |
          mkdir -p dist
          zip -r dist/backend-source.zip . \
            -x '.git/*' '.github/*' 'docs/*' 'tests/*' 'dist/*' \
               '.pytest_cache/*' '.ruff_cache/*' '__pycache__/*' '*.pyc' \
               'venv/*' '.venv/*' '.env' '.env.*' '*.db' \
               'faiss_index/*' 'generated_pdfs/*'
          files=$(unzip -Z1 dist/backend-source.zip)
          grep -qx 'requirements.txt' <<< "$files"
          grep -qx 'Procfile' <<< "$files"
          grep -qx 'app/main.py' <<< "$files"

      - name: Guardar resultado de pruebas
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

      - name: Guardar paquete de despliegue
        uses: actions/upload-artifact@v4
        with:
          name: backend-source
          path: dist/backend-source.zip
          if-no-files-found: error
          retention-days: 7
